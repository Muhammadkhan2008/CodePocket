name: Build iOS App

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build_ios:
    runs-on: macos-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install NPM Dependencies
        run: npm install

      - name: Build Frontend (Vite)
        run: npm run build

      - name: Capacitor Sync iOS
        run: npx cap sync ios

      - name: Build iOS App (Unsigned)
        working-directory: ./ios/App
        run: |
          xcodebuild -workspace App.xcworkspace \
            -scheme App \
            -configuration Debug \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            build

      - name: Zip iOS App
        working-directory: ./ios/App/DerivedData/App/Build/Products/Debug-iphonesimulator
        run: zip -r CodePocket-iOS.zip App.app
        continue-on-error: true

      - name: Upload iOS App Artifact
        uses: actions/upload-artifact@v4
        with:
          name: CodePocket-iOS-App
          path: ./ios/App/DerivedData/App/Build/Products/Debug-iphonesimulator/CodePocket-iOS.zip
        continue-on-error: true
