name: Build Android APK

on:
  push:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # Setup Java FIRST (before any Android/Gradle steps)
      - name: Setup Java 21
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '21'

      # Setup Node.js
      - name: Setup Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      # Cache Gradle dependencies to speed up builds
      - name: Cache Gradle packages
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      # Use npm ci (exact lockfile install, faster, safer for CI)
      - name: Install Node Dependencies
        run: npm ci

      # Download PRoot into assets dir (NOT jniLibs - static binaries get stripped there)
      - name: Download PRoot binary
        run: |
          mkdir -p public/native
          curl -L https://github.com/proot-me/proot/releases/download/v5.3.0/proot-v5.3.0-aarch64-static \
            -o public/native/proot
          chmod +x public/native/proot

      # Download Alpine Linux rootfs
      - name: Download Alpine Linux tarball
        run: |
          mkdir -p public/native
          curl -L https://dl-cdn.alpinelinux.org/alpine/v3.19/releases/aarch64/alpine-minirootfs-3.19.1-aarch64.tar.gz \
            -o public/native/alpine.bin

      # Build Vite frontend (outputs to dist/)
      - name: Build Frontend (Vite)
        run: npm run build

      # Sync web assets to Android project
      - name: Capacitor Sync
        run: npx cap sync android

      # Make gradlew executable
      - name: Make Gradle Wrapper Executable
        run: chmod +x android/gradlew

      # Build debug APK
      - name: Build Debug APK
        run: |
          cd android
          ./gradlew assembleDebug --no-daemon

      # Upload APK artifact
      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: CodePocket-debug
          path: android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 7

      # Build release APK (only if keystore secrets are available)
      - name: Build Release APK
        if: ${{ secrets.KEYSTORE_BASE64 != '' }}
        run: |
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 -d > android/app/codepocket.keystore
          cd android
          ./gradlew assembleRelease \
            -Pandroid.injected.signing.store.file=$(pwd)/app/codepocket.keystore \
            -Pandroid.injected.signing.store.password=${{ secrets.STORE_PASS }} \
            -Pandroid.injected.signing.key.alias=${{ secrets.KEY_ALIAS }} \
            -Pandroid.injected.signing.key.password=${{ secrets.KEY_PASS }} \
            --no-daemon

      - name: Upload Release APK
        if: ${{ secrets.KEYSTORE_BASE64 != '' }}
        uses: actions/upload-artifact@v4
        with:
          name: CodePocket-release
          path: android/app/build/outputs/apk/release/app-release.apk
          retention-days: 30
