name: Build CodePocket APK

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write
  actions: write

jobs:
  build-apk:
    name: Build Android APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Setup Node 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Download Alpine Linux + PRoot for Android
        run: |
          mkdir -p public/native

          echo "=== Step 1: Download Alpine Linux arm64 minirootfs ==="
          curl -fL --retry 5 --retry-delay 3 \
            "https://dl-cdn.alpinelinux.org/alpine/v3.19/releases/aarch64/alpine-minirootfs-3.19.1-aarch64.tar.gz" \
            -o public/native/alpine.bin

          if [ -s public/native/alpine.bin ]; then
            echo "alpine.bin OK: $(du -sh public/native/alpine.bin | cut -f1)"
          else
            echo "ERROR: alpine.bin download failed!"
            exit 1
          fi

          echo "=== Step 2: Download PRoot for arm64 from termux repo ==="
          # Download .deb and extract proot binary
          curl -fL --retry 5 --retry-delay 3 \
            "https://packages.termux.dev/apt/termux-main/pool/main/p/proot/proot_5.1.107.77_aarch64.deb" \
            -o /tmp/proot_aarch64.deb

          if [ -s /tmp/proot_aarch64.deb ]; then
            dpkg-deb -x /tmp/proot_aarch64.deb /tmp/proot_arm64_extracted
            find /tmp/proot_arm64_extracted -name "proot" -type f | head -5
            PROOT_BIN=$(find /tmp/proot_arm64_extracted -name "proot" -type f | head -1)
            if [ -n "$PROOT_BIN" ]; then
              cp "$PROOT_BIN" public/native/proot_arm64
              echo "proot_arm64 OK from deb: $(du -sh public/native/proot_arm64 | cut -f1)"
            fi
          fi

          echo "=== Step 3: Download PRoot for arm from termux repo ==="
          curl -fL --retry 3 \
            "https://packages.termux.dev/apt/termux-main/pool/main/p/proot/proot_5.1.107.77_arm.deb" \
            -o /tmp/proot_arm.deb
          if [ -s /tmp/proot_arm.deb ]; then
            dpkg-deb -x /tmp/proot_arm.deb /tmp/proot_arm_extracted
            PROOT_ARM=$(find /tmp/proot_arm_extracted -name "proot" -type f | head -1)
            [ -n "$PROOT_ARM" ] && cp "$PROOT_ARM" public/native/proot_arm && echo "proot_arm OK"
          fi

          echo "=== Step 4: Download PRoot for x86_64 from termux repo ==="
          curl -fL --retry 3 \
            "https://packages.termux.dev/apt/termux-main/pool/main/p/proot/proot_5.1.107.77_x86_64.deb" \
            -o /tmp/proot_x86.deb
          if [ -s /tmp/proot_x86.deb ]; then
            dpkg-deb -x /tmp/proot_x86.deb /tmp/proot_x86_extracted
            PROOT_X86=$(find /tmp/proot_x86_extracted -name "proot" -type f | head -1)
            [ -n "$PROOT_X86" ] && cp "$PROOT_X86" public/native/proot_x86_64 && echo "proot_x86_64 OK"
          fi

          echo "=== Final file sizes ==="
          ls -lh public/native/

          # Validate proot_arm64 exists
          if [ ! -s public/native/proot_arm64 ]; then
            echo "WARNING: proot_arm64 missing - terminal will use system shell fallback"
          fi

      - name: Install dependencies
        run: npm install --legacy-peer-deps

      - name: Build Web App
        run: npm run build

      - name: Sync Capacitor
        run: npx cap sync android

      - name: Build Debug APK
        run: |
          chmod +x android/gradlew
          cd android
          ./gradlew assembleDebug --no-daemon

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: CodePocket-debug-${{ github.run_number }}
          path: android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30

      - name: Summary
        if: always()
        run: |
          APK="android/app/build/outputs/apk/debug/app-debug.apk"
          SIZE=$(du -sh "$APK" 2>/dev/null | cut -f1 || echo "N/A")
          echo "## Build #${{ github.run_number }} - $([ -f "$APK" ] && echo 'SUCCESS' || echo 'FAILED')" >> $GITHUB_STEP_SUMMARY
          echo "APK Size: $SIZE" >> $GITHUB_STEP_SUMMARY
          echo "Alpine: $(du -sh public/native/alpine.bin 2>/dev/null | cut -f1 || echo 'N/A')" >> $GITHUB_STEP_SUMMARY
          echo "PRoot arm64: $(du -sh public/native/proot_arm64 2>/dev/null | cut -f1 || echo 'N/A')" >> $GITHUB_STEP_SUMMARY
