name: Build Android APK

on:
  push:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Java 21
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '21'

      - name: Setup Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Cache Gradle packages
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Install Node Dependencies
        run: npm ci

      - name: Download PRoot binary (into public/native so Vite bundles it)
        run: |
          mkdir -p public/native
          curl -L https://github.com/proot-me/proot/releases/download/v5.3.0/proot-v5.3.0-aarch64-static \
            -o public/native/proot
          chmod +x public/native/proot

      - name: Download Alpine Linux rootfs
        run: |
          curl -L https://dl-cdn.alpinelinux.org/alpine/v3.19/releases/aarch64/alpine-minirootfs-3.19.1-aarch64.tar.gz \
            -o public/native/alpine.bin

      - name: Build Frontend (Vite)
        run: npm run build

      - name: Capacitor Sync
        run: npx cap sync android

      - name: Make Gradle Wrapper Executable
        run: chmod +x android/gradlew

      - name: Build Debug APK
        run: |
          cd android
          ./gradlew assembleDebug --no-daemon

      - name: Upload Debug APK
        uses: actions/upload-artifact@v4
        with:
          name: CodePocket-debug
          path: android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 7

      - name: Build Release APK (only if keystore secret is set)
        env:
          KEYSTORE_B64: ${{ secrets.KEYSTORE_BASE64 }}
        run: |
          if [ -n "$KEYSTORE_B64" ]; then
            echo "$KEYSTORE_B64" | base64 -d > android/app/codepocket.keystore
            cd android
            ./gradlew assembleRelease \
              -Pandroid.injected.signing.store.file=$(pwd)/app/codepocket.keystore \
              -Pandroid.injected.signing.store.password=${{ secrets.STORE_PASS }} \
              -Pandroid.injected.signing.key.alias=${{ secrets.KEY_ALIAS }} \
              -Pandroid.injected.signing.key.password=${{ secrets.KEY_PASS }} \
              --no-daemon
          else
            echo "No keystore secret found - skipping release build"
          fi

      - name: Upload Release APK
        env:
          KEYSTORE_B64: ${{ secrets.KEYSTORE_BASE64 }}
        run: |
          if [ -n "$KEYSTORE_B64" ]; then
            echo "Release APK built"
          else
            echo "Skipped (no keystore)"
          fi
