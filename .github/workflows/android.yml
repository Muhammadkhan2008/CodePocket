name: 🚀 Build CodePocket APK

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      release_type:
        description: 'Build type (debug/release)'
        required: false
        default: 'debug'

jobs:
  build-apk:
    name: Build Android APK
    runs-on: ubuntu-latest

    steps:
      - name: ⬇️ Checkout Code
        uses: actions/checkout@v4

      - name: ☕ Setup Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: 🟢 Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: 📦 Install Dependencies
        run: npm install --legacy-peer-deps

      - name: 🔨 Build Web App (Vite)
        run: npm run build

      - name: 📱 Sync Capacitor
        run: |
          npm install -g @capacitor/cli
          npx cap sync android

      - name: 🔧 Make Gradlew Executable
        run: chmod +x android/gradlew

      - name: 🏗️ Build Debug APK
        run: |
          cd android
          ./gradlew assembleDebug --no-daemon --stacktrace

      - name: 📤 Upload Debug APK
        uses: actions/upload-artifact@v4
        with:
          name: CodePocket-debug-${{ github.run_number }}
          path: android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30

      - name: 📋 Build Summary
        run: |
          echo "## ✅ Build Complete!" >> $GITHUB_STEP_SUMMARY
          echo "**Branch:** ${{ github.ref_name }}" >> $GITHUB_STEP_SUMMARY
          echo "**Commit:** ${{ github.sha }}" >> $GITHUB_STEP_SUMMARY
          echo "**APK:** CodePocket-debug-${{ github.run_number }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Download the APK from the **Artifacts** section above ⬆️" >> $GITHUB_STEP_SUMMARY

  build-release:
    name: Build Release APK (Signed)
    runs-on: ubuntu-latest
    if: github.event.inputs.release_type == 'release' || startsWith(github.ref, 'refs/tags/v')

    steps:
      - name: ⬇️ Checkout Code
        uses: actions/checkout@v4

      - name: ☕ Setup Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: 🟢 Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: 📦 Install Dependencies
        run: npm install --legacy-peer-deps

      - name: 🔨 Build Web App
        run: npm run build

      - name: 📱 Sync Capacitor
        run: npx cap sync android

      - name: 🔧 Make Gradlew Executable
        run: chmod +x android/gradlew

      - name: 🏗️ Build Release APK
        run: |
          cd android
          ./gradlew assembleRelease --no-daemon

      - name: 📤 Upload Release APK
        uses: actions/upload-artifact@v4
        with:
          name: CodePocket-release-${{ github.run_number }}
          path: android/app/build/outputs/apk/release/app-release-unsigned.apk
          retention-days: 90
