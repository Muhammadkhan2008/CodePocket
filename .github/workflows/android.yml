name: Build Android APK
on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '22'

    - name: Install NPM Dependencies
      run: npm install

    - name: Build Frontend (Vite)
      run: npm run build

    - name: Setup Java 17
      uses: actions/setup-java@v4
      with:
        distribution: 'zulu'
        java-version: '21'

    - name: Download Alpine Tarball
      run: |
        mkdir -p dist/assets/native
        curl -L https://dl-cdn.alpinelinux.org/alpine/v3.19/releases/aarch64/alpine-minirootfs-3.19.1-aarch64.tar.gz -o dist/assets/native/alpine.tar.gz

    - name: Capacitor Sync
      run: npx cap sync android

    - name: Bundle PRoot as Native Lib
      run: |
        mkdir -p android/app/src/main/jniLibs/arm64-v8a
        curl -L https://github.com/proot-me/proot/releases/download/v5.3.0/proot-v5.3.0-aarch64-static -o android/app/src/main/jniLibs/arm64-v8a/libproot.so

    - name: Build Android APK
      working-directory: ./android
      run: |
        chmod +x gradlew
        ./gradlew assembleDebug

    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: CodePocket-App-Debug
        path: android/app/build/outputs/apk/debug/app-debug.apk
