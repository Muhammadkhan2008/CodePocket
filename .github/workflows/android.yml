name: Build CodePocket APK

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write
  actions: write

jobs:
  build-apk:
    name: Build Android APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Setup Node 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Download Alpine Linux + PRoot for Android
        run: |
          mkdir -p public/native

          echo "=== Downloading Alpine Linux 3.19 arm64 ==="
          curl -fL --retry 5 --retry-delay 3 \
            "https://dl-cdn.alpinelinux.org/alpine/v3.19/releases/aarch64/alpine-minirootfs-3.19.1-aarch64.tar.gz" \
            -o public/native/alpine.bin
          [ -s public/native/alpine.bin ] && echo "alpine.bin OK: $(du -sh public/native/alpine.bin)" || { echo "alpine FAILED"; exit 1; }

          echo "=== Downloading PRoot binaries from termux (v5.1.107.78-1) ==="
          BASE_URL="https://packages.termux.dev/apt/termux-main/pool/main/p/proot"

          for ARCH in aarch64 arm i686 x86_64; do
            DEB_FILE="/tmp/proot_${ARCH}.deb"
            curl -fL --retry 3 "${BASE_URL}/proot_5.1.107.78-1_${ARCH}.deb" -o "${DEB_FILE}" 2>&1 || true
            if [ -s "${DEB_FILE}" ]; then
              EXTRACT_DIR="/tmp/proot_${ARCH}_out"
              dpkg-deb -x "${DEB_FILE}" "${EXTRACT_DIR}" 2>/dev/null || true
              BIN=$(find "${EXTRACT_DIR}" -name "proot" -type f 2>/dev/null | head -1)
              if [ -n "${BIN}" ] && [ -f "${BIN}" ]; then
                case "${ARCH}" in
                  aarch64) cp "${BIN}" public/native/proot_arm64 ;;
                  arm)     cp "${BIN}" public/native/proot_arm ;;
                  x86_64)  cp "${BIN}" public/native/proot_x86_64 ;;
                  i686)    cp "${BIN}" public/native/proot_x86 ;;
                esac
                echo "proot_${ARCH} OK: $(du -sh ${BIN})"
              fi
            else
              echo "proot_${ARCH} deb download failed (non-fatal)"
            fi
          done

          echo "=== Final assets ==="
          ls -lh public/native/
          [ -s public/native/proot_arm64 ] && echo "proot_arm64: READY" || echo "proot_arm64: MISSING (will use system shell)"

      - name: Install dependencies
        run: npm install --legacy-peer-deps

      - name: Build Web App
        run: npm run build

      - name: Sync Capacitor
        run: npx cap sync android

      - name: Build Debug APK
        run: |
          chmod +x android/gradlew
          cd android
          ./gradlew assembleDebug --no-daemon

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: CodePocket-debug-${{ github.run_number }}
          path: android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30

      - name: Summary
        if: always()
        run: |
          APK="android/app/build/outputs/apk/debug/app-debug.apk"
          SIZE=$(du -sh "$APK" 2>/dev/null | cut -f1 || echo "N/A")
          echo "## Build #${{ github.run_number }}" >> $GITHUB_STEP_SUMMARY
          echo "APK: $SIZE" >> $GITHUB_STEP_SUMMARY
          echo "Alpine: $(du -sh public/native/alpine.bin 2>/dev/null | cut -f1 || echo 'missing')" >> $GITHUB_STEP_SUMMARY
          echo "PRoot arm64: $(du -sh public/native/proot_arm64 2>/dev/null | cut -f1 || echo 'missing')" >> $GITHUB_STEP_SUMMARY
          echo "Download from Artifacts above" >> $GITHUB_STEP_SUMMARY
